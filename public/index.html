<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pratica Full Stack</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="panel">
      <p class="eyebrow">Desenvolvimento Full Stack</p>
      <h1>Saudacao personalizada</h1>
      <p class="intro">
        Digite seu nome para enviar uma requisicao HTTP ao servidor Node.js e receber uma resposta personalizada.
      </p>

      <form id="greeting-form" class="form">
        <label for="name">Nome</label>
        <div class="input-row">
          <input id="name" name="name" type="text" placeholder="Ex.: Ana" autocomplete="name" required>
          <button type="submit">Enviar</button>
        </div>
      </form>

      <div id="result" class="result" aria-live="polite">
        A resposta do servidor aparecera aqui.
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
